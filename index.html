<!DOCTYPE html>

<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>دوره مسیر</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:tahoma;

background:#f7f5ef;

direction:rtl;

text-align:center;

}
  
  header{

background:linear-gradient(180deg,#5f7758,#7f9776);

padding:55px 20px;

color:white;

box-shadow:0 5px 18px rgba(0,0,0,.15);

}

header h1{

font-size:42px;

margin-bottom:18px;

}

header h2{

font-size:26px;

font-weight:normal;

color:#ffe8a3;

margin-bottom:15px;

}

header p{

font-size:18px;

opacity:.95;

}

@media(max-width:700px){

header h1{

font-size:30px;

}

header h2{

font-size:20px;

}

header p{

font-size:15px;

}

}
  
.tree{

width:100%;

margin:35px auto;

display:flex;

justify-content:center;

}

.tree img{

width:92%;

max-width:900px;

display:block;

border-radius:18px;

box-shadow:0 8px 30px rgba(0,0,0,.18);

}
  
.chapters{

width:92%;

max-width:900px;

margin:auto;

display:grid;

grid-template-columns:1fr;

gap:20px;

margin-top:25px;

margin-bottom:40px;

}

.chapter{

display:block;

background:white;

border-radius:18px;

padding:22px;

text-decoration:none;

color:#333;

box-shadow:0 5px 15px rgba(0,0,0,.12);

transition:.3s;

}

.chapter:hover{

transform:translateY(-6px);

box-shadow:0 12px 28px rgba(0,0,0,.18);

}

.chapter h3{

color:#5f7758;

font-size:26px;

margin-bottom:10px;

}

.chapter p{

font-size:20px;

margin-bottom:10px;

}

.chapter span{

color:#777;

font-size:16px;

}

@media(min-width:900px){

.chapters{

grid-template-columns:1fr 1fr;

}

}
</style>

</head>

<body>
  
  <header>

<h1>🌱 دوره مسیر</h1>

<h2>معماران اندیشه، در مسیر تحول</h2>

<p>

سفر از اینجا آغاز می‌شود...

</p>

</header>
  
  <div class="tree">

<img src="tree.png" alt="درخت مسیر">
    
    <div class="chapters">

<a href="index1.html" class="chapter">
<h3>سرفصل اول</h3>
<p>معنا و ضرورت تحول</p>
<span>استاد صدیقی</span>
</a>

<a href="index2.html" class="chapter">
<h3>سرفصل دوم</h3>
<p>هویت معلمی</p>
<span>استاد رفیعی</span>
</a>

<a href="index3.html" class="chapter">
<h3>سرفصل سوم</h3>
<p>استعمار آموزشی</p>
<span>استاد فیاضی</span>
</a>

<a href="index4.html" class="chapter">
<h3>سرفصل چهارم</h3>
<p>جریان‌شناسی آموزش و پرورش</p>
<span>استاد خاکی</span>
</a>

<a href="index5.html" class="chapter">
<h3>سرفصل پنجم</h3>
<p>نقش‌آفرینی دانشجو معلم</p>
<span>استاد شمسینی</span>
</a>

</div>

</div>

</body>

</html>
