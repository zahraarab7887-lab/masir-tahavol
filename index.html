}

.container{
position:relative;
max-width:1600px;

.container img{

}

.card{

.card:hover{

}

.card h2{
font-size:28px;
margin-bottom:8px;
}

.card p{
font-size:22px;
margin-bottom:8px;
font-weight:bold;
}

.card span{
font-size:18px;
color:#6b4d1d;
}

</style>

</head>
