<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>دوره مسیر</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:tahoma;

direction:rtl;

background:#f4f6f2;

color:#333;

}
  
.hero{

background:linear-gradient(135deg,#4d6b50,#78906d);

color:white;

padding:65px 20px;

text-align:center;

border-radius:0 0 35px 35px;

box-shadow:0 6px 20px rgba(0,0,0,.15);

}

.hero h1{

font-size:42px;

margin-bottom:15px;

}

.hero h2{

font-size:24px;

color:#ffe7a0;

margin-bottom:18px;

}

.hero p{

font-size:18px;

opacity:.95;

margin-bottom:28px;

}

.start-btn{

display:inline-block;

padding:15px 35px;

background:white;

color:#4d6b50;

font-weight:bold;

text-decoration:none;

border-radius:50px;

transition:.3s;

box-shadow:0 5px 15px rgba(0,0,0,.2);

}

.start-btn:hover{

transform:translateY(-3px);

background:#f6f6f6;

}

@media(max-width:768px){

.hero{

padding:45px 18px;

}

.hero h1{

font-size:30px;

}

.hero h2{

font-size:20px;

}

.hero p{

font-size:15px;

}

.start-btn{

padding:13px 28px;

font-size:15px;

}

}
</style>

</head>

<body>
  
  <header class="hero">

<h1>🌱 دوره مسیر</h1>

<h2>معماران اندیشه، در مسیر تحول</h2>

<p>

سفری برای ساختن آینده‌ای متفاوت...

</p>

<a href="index1.html" class="start-btn">

🚶 شروع سفر

</a>

</header>

</body>

</html>
