<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>دوره علمی تخصصی مسیر</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:tahoma;

background:linear-gradient(
180deg,
#eef5eb 0%,
#f7f5ef 40%,
#f5f0e6 100%
);

overflow-x:hidden;

color:#2f3b2f;

}

header{

text-align:center;

padding:50px 20px 20px;

}

header h1{

font-size:42px;

color:#4d6648;

margin-bottom:15px;

}

header h2{

font-size:22px;

font-weight:normal;

color:#6c7d67;

line-height:2;

}

.container{

position:relative;

width:100%;

max-width:900px;

margin:auto;

padding-bottom:120px;

}
  /* ========================= */
/* درخت */
/* ========================= */

.tree{

position:relative;

width:100%;

height:1100px;

margin-top:30px;

}

.trunk{

position:absolute;

left:50%;

transform:translateX(-50%);

bottom:180px;

width:45px;

height:620px;

background:#7b4f2c;

border-radius:25px;

}

.roots{

position:absolute;

left:50%;

transform:translateX(-50%);

bottom:120px;

width:260px;

height:80px;

}

.root{

position:absolute;

height:10px;

background:#7b4f2c;

border-radius:20px;

}

.r1{

width:90px;

left:10px;

bottom:50px;

transform:rotate(-20deg);

}

.r2{

width:100px;

left:80px;

bottom:20px;

transform:rotate(10deg);

}

.r3{

width:90px;

right:20px;

bottom:50px;

transform:rotate(20deg);

}

.r4{

width:90px;

right:90px;

bottom:0;

transform:rotate(-10deg);

}

.crown{

position:absolute;

left:50%;

transform:translateX(-50%);

top:40px;

width:520px;

height:320px;

background:#5f7758;

border-radius:50%;

box-shadow:

0 0 0 35px rgba(95,119,88,.12),

0 0 0 70px rgba(95,119,88,.06);

}
  <body>

<header>

<h1>🌱 دوره علمی تخصصی مسیر</h1>

<h2>

از ریشه‌های تحول<br>

تا افق تمدن‌سازی

</h2>

</header>

<div class="container">

<div class="tree">

<div class="crown"></div>

<div class="trunk"></div>

<div class="roots">

<div class="root r1"></div>

<div class="root r2"></div>

<div class="root r3"></div>

<div class="root r4"></div>

</div>

</div>

</div>

</body>

</html>
