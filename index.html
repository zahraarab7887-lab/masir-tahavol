<!DOCTYPE html>

<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>دوره مسیر</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:tahoma;

background:#f7f5ef;

direction:rtl;

text-align:center;

}
  
  header{

background:linear-gradient(180deg,#5f7758,#7f9776);

padding:55px 20px;

color:white;

box-shadow:0 5px 18px rgba(0,0,0,.15);

}

header h1{

font-size:42px;

margin-bottom:18px;

}

header h2{

font-size:26px;

font-weight:normal;

color:#ffe8a3;

margin-bottom:15px;

}

header p{

font-size:18px;

opacity:.95;

}

@media(max-width:700px){

header h1{

font-size:30px;

}

header h2{

font-size:20px;

}

header p{

font-size:15px;

}

}
  
.tree{

width:100%;

margin:35px auto;

display:flex;

justify-content:center;

}

.tree img{

width:92%;

max-width:900px;

display:block;

border-radius:18px;

box-shadow:0 8px 30px rgba(0,0,0,.18);

}
</style>

</head>

<body>
  
  <header>

<h1>🌱 دوره مسیر</h1>

<h2>معماران اندیشه، در مسیر تحول</h2>

<p>

سفر از اینجا آغاز می‌شود...

</p>

</header>
  
  <div class="tree">

<img src="tree.png" alt="درخت مسیر">

</div>

</body>

</html>
