<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>دوره مسیر</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:tahoma;

direction:rtl;

background:#f4f6f2;

color:#333;

}
  
.hero{

background:linear-gradient(135deg,#4d6b50,#78906d);

color:white;

padding:65px 20px;

text-align:center;

border-radius:0 0 35px 35px;

box-shadow:0 6px 20px rgba(0,0,0,.15);

}

.hero h1{

font-size:42px;

margin-bottom:15px;

}

.hero h2{

font-size:24px;

color:#ffe7a0;

margin-bottom:18px;

}

.hero p{

font-size:18px;

opacity:.95;

margin-bottom:28px;

}

.start-btn{

display:inline-block;

padding:15px 35px;

background:white;

color:#4d6b50;

font-weight:bold;

text-decoration:none;

border-radius:50px;

transition:.3s;

box-shadow:0 5px 15px rgba(0,0,0,.2);

}

.start-btn:hover{

transform:translateY(-3px);

background:#f6f6f6;

}

@media(max-width:768px){

.hero{

padding:45px 18px;

}

.hero h1{

font-size:30px;

}

.hero h2{

font-size:20px;

}

.hero p{

font-size:15px;

}

.start-btn{

padding:13px 28px;

font-size:15px;

}

}
  
  .banner{

width:100%;

padding:35px 15px;

display:flex;

justify-content:center;

}

.banner img{

width:100%;

max-width:900px;

border-radius:25px;

display:block;

box-shadow:0 15px 40px rgba(0,0,0,.18);

transition:.4s;

}

.banner img:hover{

transform:scale(1.01);

}
  
  .course{

width:92%;

max-width:1000px;

margin:20px auto 60px;

}

.course h2{

text-align:center;

font-size:30px;

color:#4d6b50;

margin-bottom:30px;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(260px,1fr));

gap:20px;

}

.card{

background:white;

border-radius:22px;

padding:28px;

text-decoration:none;

color:#333;

box-shadow:0 10px 25px rgba(0,0,0,.10);

transition:.3s;

}

.card:hover{

transform:translateY(-6px);

box-shadow:0 18px 35px rgba(0,0,0,.16);

}

.card span{

font-size:42px;

display:block;

margin-bottom:15px;

}

.card h3{

color:#5f7758;

margin-bottom:12px;

font-size:24px;

}

.card p{

font-size:18px;

line-height:1.8;

}

@media(max-width:768px){

.course h2{

font-size:24px;

}

.card{

padding:22px;

}

.card h3{

font-size:20px;

}

.card p{

font-size:16px;

}

}
  
.locked{

opacity:.5;

pointer-events:none;

filter:grayscale(100%);

position:relative;

}

.locked::after{

content:"🔒 به زودی";

position:absolute;

top:15px;

left:15px;

background:#d32f2f;

color:white;

padding:6px 12px;

border-radius:20px;

font-size:13px;

font-weight:bold;

}
  
</style>

</head>

<body>
  
  <header class="hero">

<h1>🌱 دوره مسیر</h1>

<h2>معماران اندیشه، در مسیر تحول</h2>

<p>

سفری برای ساختن آینده‌ای متفاوت...

</p>

<a href="index1.html" class="start-btn">

🚶 شروع سفر

</a>

</header>
  
<section class="banner">

<img src="tree.png" alt="درخت مسیر">

</section>
  
  <section class="course">

<h2>ایستگاه‌های مسیر</h2>

<div class="cards">

<a href="index1.html" class="card">
<span>🌱</span>
<h3>ایستگاه اول</h3>
<p>ضرورت تحول بنیادین</p>
</a>

<a href="index2.html" class="card">
<span>🧩</span>
<h3>ایستگاه دوم</h3>
<p>هویت معلمی</p>
</a>

<a href="index3.html" class="card">
<span>🛤️</span>
<h3>ایستگاه سوم</h3>
<p>چگونگی کنشگری</p>
</a>

<a href="index4.html" class="card">
<span>✂️</span>
<h3>ایستگاه چهارم</h3>
<p>جریان‌شناسی آموزش و پرورش</p>
</a>

<a href="index5.html" class="card">
<span>🏛️</span>
<h3>ایستگاه پنجم</h3>
<p>معلم؛ معمار تمدن نوین</p>
</a>

</div>

</section>
  
  <script>

const today = new Date();

const unlockDates = {

lesson1: new Date("2026-07-19"), // ۲۸ تیر

lesson2: new Date("2026-07-21"), // ۳۰ تیر

lesson3: new Date("2026-07-22"), // ۳۱ تیر

lesson4: new Date("2026-07-23"), // ۱ مرداد

lesson5: new Date("2026-07-24")  // ۲ مرداد

};
    
const cards=document.querySelectorAll(".card");

const dates=[
unlockDates.lesson1,
unlockDates.lesson2,
unlockDates.lesson3,
unlockDates.lesson4,
unlockDates.lesson5
];

cards.forEach((card,index)=>{

if(today<dates[index]){

card.classList.add("locked");

card.removeAttribute("href");

}

});
    
</script>
  
</body>

</html>
