body{

}

header{

background:#5f7758;

color:white;

}

.path{

justify-content:center;

}

.step{

height:36px;

border-radius:50%;

font-weight:bold;

}

.current{

}

width:30px;

height:4px;

}

.box{

margin:35px auto;

max-width:900px;

background:white;

padding:35px;

border-radius:20px;

box-shadow:0 0 20px rgba(0,0,0,.12);

}

p{

font-size:20px;

line-height:2;

}

.icons{

display:flex;

justify-content:center;

gap:22px;

margin-top:30px;

font-size:52px;

flex-wrap:wrap;

}

.item{

text-decoration:none;

color:#5f7758;

transition:.3s;

}

.item:hover{

transform:scale(1.15);

}

.names{

display:flex;

justify-content:center;

gap:28px;

margin-top:10px;

font-size:16px;

font-weight:bold;

color:#5f7758;

flex-wrap:wrap;

}

.names span{

width:70px;

}

.home{

display:inline-block;

margin-top:35px;

padding:12px 28px;

background:#5f7758;

color:white;

text-decoration:none;

border-radius:12px;

font-size:18px;

}

.home:hover{

background:#486043;

}

@media(max-width:700px){

header{

font-size:28px;

}

.icons{

font-size:42px;

gap:18px;

}

.names{

font-size:14px;

gap:16px;

}

.names span{

width:55px;

}

.step{

width:30px;

height:30px;

font-size:14px;

}

.line{

width:20px;

}
