<!DOCTYPE html>

<title>سرفصل دوم</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:tahoma;
background:#f7f5ef;
direction:rtl;
text-align:center;
}

header{
background:#5f7758;
color:white;
padding:30px 20px;
font-size:34px;
font-weight:bold;
}

.path{
display:flex;
justify-content:center;
align-items:center;
margin:25px auto;
flex-wrap:nowrap;
}

.step{
width:36px;
height:36px;
border-radius:50%;
background:#d9d9d9;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
color:#666;
}

.done{
background:#5f7758;
color:white;
}

.current{
background:#b58b3b;
color:white;
transform:scale(1.15);
}

.line{
width:30px;
height:4px;
background:#5f7758;
margin:0 6px;
border-radius:10px;
}

.box{
margin:35px auto;
width:90%;
max-width:900px;
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.12);
}

p{
font-size:20px;
line-height:2;
}

.icons{
display:flex;
justify-content:center;
gap:22px;
margin-top:30px;
font-size:52px;
flex-wrap:wrap;
}

.item{
text-decoration:none;
color:#5f7758;
transition:.3s;
}

.item:hover{
transform:scale(1.15);
}

.names{
display:flex;
justify-content:center;
gap:28px;
margin-top:10px;
font-size:16px;
font-weight:bold;
color:#5f7758;
flex-wrap:wrap;
}

.names span{
width:70px;
}

.home{
display:inline-block;
margin-top:35px;
padding:12px 28px;
background:#5f7758;
color:white;
text-decoration:none;
border-radius:12px;
font-size:18px;
}

.home:hover{
background:#486043;
}

@media(max-width:700px){

header{
font-size:28px;
}

.icons{
font-size:42px;
gap:18px;
}

.names{
font-size:14px;
gap:16px;
}

.names span{
width:55px;
}

.step{
width:30px;
height:30px;
font-size:14px;
}

.line{
width:20px;
}

p{
font-size:18px;
}

}
  
.path a{

text-decoration:none;

display:flex;

justify-content:center;

align-items:center;

transition:.3s;

}

.path a:hover{

transform:scale(1.15);

}
  
</style>

</head>
